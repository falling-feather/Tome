version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: inkless
      POSTGRES_USER: inkless
      POSTGRES_PASSWORD: inkless
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkless -d inkless"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # All-in-one Jaeger (OTLP HTTP 4318 / UI 16686)。仅在 otel profile 启用：
  #   docker compose --profile otel up jaeger
  # 启动后设置 OTEL_ENABLED=true, OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
  jaeger:
    image: jaegertracing/all-in-one:1.56
    profiles: ["otel"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Web UI
      - "4318:4318"    # OTLP HTTP receiver
    restart: unless-stopped

volumes:
  postgres_data:
